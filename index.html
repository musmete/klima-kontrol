<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Klima">
<title>Mitsubishi Klima</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --red:   #d0021b;
  --red2:  #a80016;
  --bg:    #f0f2f5;
  --card:  #ffffff;
  --dark:  #1a1a2e;
  --text:  #1a1a2e;
  --sub:   #8a9bb5;
  --border:#e2e8f0;
  --blue:  #1565c0;
  --on:    #2e7d32;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* ── Top bar ── */
.topbar {
  background: var(--red);
  padding: 50px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-row { display:flex; align-items:center; gap:10px; }
/* Mitsubishi wordmark - three diamond shapes inline */
.mits-diamonds { display:flex; gap:2px; align-items:center; }
.mits-diamonds .d {
  width:10px; height:16px;
  background: white;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.logo-text { color:white; font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.logo-sub  { color:rgba(255,255,255,.7); font-size:10px; letter-spacing:.8px; }
.conn-pill {
  background: rgba(0,0,0,.2); border-radius:20px;
  padding: 5px 10px; display:flex; align-items:center; gap:6px;
}
.conn-dot { width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3); transition:.3s; }
.conn-dot.ok  { background:#69f0ae; box-shadow:0 0 6px #69f0ae; }
.conn-dot.err { background:#ff5252; }
.conn-txt { color:white; font-size:11px; }

/* ── Main card ── */
.main-card {
  background: var(--red);
  padding: 0 16px 20px;
}
.temp-circle {
  background: white;
  border-radius: 24px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.temps-row {
  display: flex; gap: 20px; width:100%;
  margin-bottom: 16px;
}
.temp-box {
  flex:1; text-align:center;
  background: #f7f9fc; border-radius:16px; padding:14px 8px;
}
.temp-box-val { font-size:36px; font-weight:300; color:var(--text); line-height:1; }
.temp-box-val sup { font-size:16px; color:var(--sub); vertical-align:super; }
.temp-box-label { font-size:10px; color:var(--sub); letter-spacing:.7px; margin-top:4px; text-transform:uppercase; }
.temp-divider { width:1px; background:var(--border); align-self:stretch; }

/* Set temp control */
.settemp-row {
  display:flex; align-items:center; gap:16px; width:100%;
}
.settemp-display { flex:1; text-align:center; }
.settemp-val { font-size:28px; font-weight:500; color:var(--text); }
.settemp-label { font-size:10px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px; }
.temp-btn {
  width:44px; height:44px; border-radius:50%;
  border: 2px solid var(--border); background:white;
  color:var(--red); font-size:24px; font-weight:400; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 2px 8px rgba(0,0,0,.08); transition:.15s;
}
.temp-btn:active { background:#fff0f0; transform:scale(.9); }

/* Power button */
.power-section {
  display:flex; align-items:center; justify-content:center;
  gap:16px; margin-top:16px; width:100%;
}
.power-btn {
  width:64px; height:64px; border-radius:50%;
  border: 3px solid var(--border); background: #f7f9fc;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow: 0 3px 12px rgba(0,0,0,.1); transition:.2s;
}
.power-btn:active { transform:scale(.92); }
.power-btn.on {
  border-color: var(--on); background:#e8f5e9;
  box-shadow: 0 3px 16px rgba(46,125,50,.25);
}
.power-icon { font-size:28px; }
.power-info { text-align:center; }
.power-status-txt { font-size:22px; font-weight:700; color:var(--text); }
.power-status-txt.on { color:var(--on); }
.mode-chip {
  display:inline-block; margin-top:4px;
  background:var(--border); border-radius:20px;
  padding:3px 10px; font-size:12px; color:var(--sub); font-weight:500;
}
.mode-chip.heat { background:#fff3e0; color:#e65100; }
.mode-chip.cool { background:#e3f2fd; color:#1565c0; }
.mode-chip.dry  { background:#f3e5f5; color:#6a1b9a; }
.mode-chip.fan  { background:#e8f5e9; color:#2e7d32; }
.mode-chip.auto { background:#ede7f6; color:#4527a0; }

/* ── Sections ── */
.section { background:white; margin:10px 12px 0; border-radius:18px; padding:16px; }
.section-title {
  font-size:11px; font-weight:700; color:var(--sub);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;
}

/* Mode buttons */
.mode-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.mode-btn {
  border-radius:12px; border:1.5px solid var(--border);
  background:white; padding:10px 2px 8px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:9px; font-weight:700; color:var(--sub); letter-spacing:.3px;
  transition:.18s;
}
.mode-btn .ico { font-size:20px; }
.mode-btn:active { opacity:.7; }
.mode-btn.sel-heat { border-color:#e65100; background:#fff8f5; color:#e65100; }
.mode-btn.sel-cool { border-color:#1565c0; background:#f0f7ff; color:#1565c0; }
.mode-btn.sel-dry  { border-color:#6a1b9a; background:#fdf5ff; color:#6a1b9a; }
.mode-btn.sel-fan  { border-color:#2e7d32; background:#f5fff6; color:#2e7d32; }
.mode-btn.sel-auto { border-color:#4527a0; background:#f8f5ff; color:#4527a0; }

/* Fan row */
.pill-row { display:flex; gap:6px; }
.pill-btn {
  flex:1; border-radius:10px; border:1.5px solid var(--border);
  background:white; color:var(--sub); padding:10px 4px;
  cursor:pointer; font-size:12px; font-weight:600; text-align:center;
  transition:.18s;
}
.pill-btn.sel { border-color:var(--red); background:#fff0f0; color:var(--red); }
.pill-btn:active { opacity:.7; }

/* Vane */
.vane-row { display:flex; gap:5px; }
.vane-btn {
  flex:1; border-radius:10px; border:1.5px solid var(--border);
  background:white; color:var(--sub); padding:9px 2px;
  cursor:pointer; font-size:13px; text-align:center; transition:.18s;
}
.vane-btn.sel { border-color:#1565c0; background:#f0f7ff; color:#1565c0; }
.vane-btn:active { opacity:.7; }

/* Info row */
.info-row { display:flex; gap:8px; }
.info-item {
  flex:1; background:#f7f9fc; border-radius:12px;
  padding:12px; text-align:center;
}
.info-val { font-size:18px; font-weight:600; color:var(--text); }
.info-label { font-size:10px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

/* Status bar */
.statusbar { text-align:center; font-size:11px; color:var(--sub); padding:14px; }

/* Bottom nav (MELCloud style) */
.bottomnav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:var(--red2); display:flex;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex:1; padding:10px 4px 8px; border:none; background:transparent;
  color:rgba(255,255,255,.6); font-size:9px; font-weight:600;
  letter-spacing:.5px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:3px; text-transform:uppercase;
}
.nav-btn .nav-ico { font-size:20px; }
.nav-btn.active { color:white; }
.nav-btn.active .nav-ico { filter:drop-shadow(0 0 4px rgba(255,255,255,.5)); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo-row">
    <svg viewBox="0 0 100 88" width="38" height="34" style="flex-shrink:0">
      <g transform="translate(50,50)" fill="white">
        <polygon points="0,-44 14,-22 0,0 -14,-22"/>
        <polygon points="0,-44 14,-22 0,0 -14,-22" transform="rotate(120)"/>
        <polygon points="0,-44 14,-22 0,0 -14,-22" transform="rotate(240)"/>
      </g>
    </svg>
    <div>
      <div class="logo-text">Mitsubishi Electric</div>
      <div class="logo-sub">MSZ-FA35VA</div>
    </div>
  </div>
  <div class="conn-pill">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-txt" id="connTxt">--</span>
  </div>
</div>

<!-- Main card -->
<div class="main-card">
  <div class="temp-circle">

    <!-- Sıcaklıklar -->
    <div class="temps-row">
      <div class="temp-box">
        <div class="temp-box-val" id="roomTempVal">--<sup>°</sup></div>
        <div class="temp-box-label">Oda</div>
      </div>
      <div class="temp-divider"></div>
      <div class="temp-box">
        <div class="temp-box-val" id="outTempVal">--<sup>°</sup></div>
        <div class="temp-box-label">Dış Ortam</div>
      </div>
    </div>

    <!-- Güç & durum -->
    <div class="power-section">
      <button class="temp-btn" onclick="changeTemp(-0.5)">−</button>
      <div style="text-align:center">
        <button class="power-btn" id="powerBtn" onclick="togglePower()">
          <span class="power-icon">⏻</span>
        </button>
      </div>
      <button class="temp-btn" onclick="changeTemp(+0.5)">+</button>
    </div>

    <div style="margin-top:10px;text-align:center">
      <div class="power-status-txt" id="powerTxt">KAPALI</div>
      <div class="mode-chip" id="modeChip">—</div>
    </div>

    <!-- Hedef sıcaklık -->
    <div class="settemp-row" style="margin-top:14px;">
      <div style="flex:1;font-size:11px;color:var(--sub);text-align:center;text-transform:uppercase;letter-spacing:.5px">Hedef sıcaklık</div>
      <div class="settemp-val" id="setTempVal">22.0°</div>
    </div>

  </div>
</div>

<!-- Mod -->
<div class="section">
  <div class="section-title">Çalışma Modu</div>
  <div class="mode-grid">
    <button class="mode-btn" id="mHEAT" onclick="setMode('HEAT',1)"><span class="ico">🔥</span>ISITMA</button>
    <button class="mode-btn" id="mCOOL" onclick="setMode('COOL',3)"><span class="ico">❄️</span>SOĞUTMA</button>
    <button class="mode-btn" id="mAUTO" onclick="setMode('AUTO',8)"><span class="ico">🔄</span>OTO</button>
    <button class="mode-btn" id="mDRY"  onclick="setMode('DRY',2)"><span class="ico">💧</span>KURUTMA</button>
    <button class="mode-btn" id="mFAN"  onclick="setMode('FAN',7)"><span class="ico">💨</span>FAN</button>
  </div>
</div>

<!-- Fan -->
<div class="section">
  <div class="section-title">Fan Hızı</div>
  <div class="pill-row">
    <button class="pill-btn" id="fAUTO"  onclick="setFan('AUTO')">Oto</button>
    <button class="pill-btn" id="f1"     onclick="setFan('1')">1</button>
    <button class="pill-btn" id="f2"     onclick="setFan('2')">2</button>
    <button class="pill-btn" id="f3"     onclick="setFan('3')">3</button>
    <button class="pill-btn" id="f4"     onclick="setFan('4')">4</button>
    <button class="pill-btn" id="fQUIET" onclick="setFan('QUIET')">Sessiz</button>
  </div>
</div>

<!-- Dikey Yönlendirme -->
<div class="section">
  <div class="section-title">Dikey Yönlendirme</div>
  <div class="vane-row">
    <button class="vane-btn" id="vAUTO"  onclick="setVane('AUTO')">Oto</button>
    <button class="vane-btn" id="v1"     onclick="setVane('1')">▲▲</button>
    <button class="vane-btn" id="v2"     onclick="setVane('2')">▲</button>
    <button class="vane-btn" id="v3"     onclick="setVane('3')">—</button>
    <button class="vane-btn" id="v4"     onclick="setVane('4')">▼</button>
    <button class="vane-btn" id="v5"     onclick="setVane('5')">▼▼</button>
    <button class="vane-btn" id="vSWING" onclick="setVane('SWING')">↕</button>
  </div>
</div>

<!-- Yatay Yönlendirme -->
<div class="section">
  <div class="section-title">Yatay Yönlendirme</div>
  <div class="vane-row">
    <button class="vane-btn" id="w<<"    onclick="setWVane('<<')">◀◀</button>
    <button class="vane-btn" id="w<"     onclick="setWVane('<')">◀</button>
    <button class="vane-btn" id="w|"     onclick="setWVane('|')">●</button>
    <button class="vane-btn" id="w>"     onclick="setWVane('>')">▶</button>
    <button class="vane-btn" id="w>>"    onclick="setWVane('>>')">▶▶</button>
    <button class="vane-btn" id="w<>"    onclick="setWVane('<>')">◀▶</button>
    <button class="vane-btn" id="wSWING" onclick="setWVane('SWING')">↔</button>
  </div>
</div>

<!-- Bilgi -->
<div class="section">
  <div class="section-title">Cihaz Durumu</div>
  <div class="info-row">
    <div class="info-item">
      <div class="info-val" id="operatingVal">—</div>
      <div class="info-label">Kompresör</div>
    </div>
    <div class="info-item">
      <div class="info-val" id="iseeVal">—</div>
      <div class="info-label">i-see Sensör</div>
    </div>
    <div class="info-item">
      <div class="info-val" id="cn105Val">—</div>
      <div class="info-label">CN105</div>
    </div>
  </div>
</div>

<div class="statusbar" id="statusBar">Bağlanıyor...</div>

<!-- Bottom nav -->
<div class="bottomnav">
  <button class="nav-btn active"><span class="nav-ico">🏠</span>Kontrol</button>
  <button class="nav-btn"><span class="nav-ico">📊</span>Raporlar</button>
  <button class="nav-btn"><span class="nav-ico">⚙️</span>Ayarlar</button>
</div>

<script>
const BROKER    = 'wss://broker.emqx.io:8084/mqtt';
const MAC       = 'D48AFC9E85C8';
const TOPIC_ST  = 'mits/' + MAC + '/status';
const TOPIC_CMD = 'mits/' + MAC + '/cmd';

let ac = {
  power:false, mode:'COOL', setTemp:22, fan:'AUTO',
  vane:'AUTO', wideVane:'|', roomTemp:null, outTemp:null,
  iSee:false, operating:false, cn105:false
};

// Per-field command lock (8 sn)
const locks = {};
function lock(...fs) { fs.forEach(f => { clearTimeout(locks[f]); locks[f]=setTimeout(()=>delete locks[f],8000); }); }
function locked(f)  { return !!locks[f]; }

// MQTT
const client = mqtt.connect(BROKER, {
  clientId:'app_'+Math.random().toString(36).slice(2,8),
  clean:true, reconnectPeriod:3000, connectTimeout:8000
});
client.on('connect',   () => { setConn('ok','Bağlı'); client.subscribe(TOPIC_ST); });
client.on('close',     () => setConn('err','Bağlantı yok'));
client.on('reconnect', () => setConn('','Bağlanıyor'));

client.on('message', (t, payload) => {
  try {
    const d = JSON.parse(payload.toString());
    if (!locked('power')    && d.power    !=null) ac.power    = d.power===true||d.power==='ON';
    if (!locked('mode')     && d.mode     !=null) ac.mode     = d.mode;
    if (!locked('setTemp')  && d.setTemp  !=null) ac.setTemp  = +d.setTemp;
    if (!locked('fan')      && d.fan      !=null) ac.fan      = d.fan;
    if (!locked('vane')     && d.vane     !=null) ac.vane     = d.vane;
    if (!locked('wideVane') && d.wideVane !=null) ac.wideVane = d.wideVane;
    if (d.roomTemp !=null) ac.roomTemp  = +d.roomTemp;
    if (d.outTemp  !=null) ac.outTemp   = +d.outTemp;
    if (d.iSee     !=null) ac.iSee      = d.iSee;
    if (d.operating!=null) ac.operating = d.operating;
    if (d.cn105    !=null) ac.cn105     = d.cn105;
    renderAll();
    setStatus('Güncellendi ' + new Date().toLocaleTimeString('tr-TR'));
  } catch(e){}
});

function send(obj) { lock(...Object.keys(obj)); client.publish(TOPIC_CMD, JSON.stringify(obj)); }

// Actions
function togglePower() { ac.power=!ac.power; send({power:ac.power}); renderPower(); }
let tTimer=null;
function changeTemp(d) {
  ac.setTemp = Math.round((Math.min(31,Math.max(16,ac.setTemp+d))*2))/2;
  lock('setTemp'); renderTemp();
  clearTimeout(tTimer); tTimer=setTimeout(()=>send({setTemp:ac.setTemp}),400);
}
function setMode(s,n)  { ac.mode=s;      send({mode:n});          renderMode(); }
function setFan(s)     { ac.fan=s;       send({fan:s});            renderFan(); }
function setVane(v)    { ac.vane=v;      send({vane:v});           renderVane(); }
function setWVane(v)   { ac.wideVane=v;  send({wideVane:v});       renderWVane(); }

// Render
function renderAll(){ renderPower();renderTemp();renderMode();renderFan();renderVane();renderWVane();renderInfo(); }

const MCOL  = {HEAT:'heat',COOL:'cool',DRY:'dry',FAN:'fan',AUTO:'auto'};
const MNAME = {HEAT:'Isıtma 🔥',COOL:'Soğutma ❄️',DRY:'Kurutma 💧',FAN:'Fan 💨',AUTO:'Otomatik 🔄'};

function renderPower(){
  const btn=document.getElementById('powerBtn');
  const txt=document.getElementById('powerTxt');
  const chip=document.getElementById('modeChip');
  btn.classList.toggle('on',ac.power);
  txt.textContent = ac.power?'AÇIK':'KAPALI';
  txt.className   = 'power-status-txt'+(ac.power?' on':'');
  chip.textContent= MNAME[ac.mode]||ac.mode;
  chip.className  = 'mode-chip '+(MCOL[ac.mode]||'');
}
function renderTemp(){
  const rt=ac.roomTemp&&ac.roomTemp>0?ac.roomTemp.toFixed(1):'--';
  const ot=ac.outTemp!=null&&ac.outTemp>-50?ac.outTemp.toFixed(1):'--';
  document.getElementById('roomTempVal').innerHTML = rt+'<sup>°</sup>';
  document.getElementById('outTempVal').innerHTML  = ot+'<sup>°</sup>';
  document.getElementById('setTempVal').textContent= ac.setTemp.toFixed(1)+'°';
}
function renderMode(){
  ['HEAT','COOL','AUTO','DRY','FAN'].forEach(m=>{
    const el=document.getElementById('m'+m);
    if(el) el.className='mode-btn'+(ac.mode===m?' sel-'+MCOL[m]:'');
  });
}
function renderFan(){
  ['AUTO','1','2','3','4','QUIET'].forEach(f=>{
    const el=document.getElementById('f'+f);
    if(el) el.classList.toggle('sel',ac.fan===f);
  });
}
function renderVane(){
  ['AUTO','1','2','3','4','5','SWING'].forEach(v=>{
    const el=document.getElementById('v'+v);
    if(el) el.classList.toggle('sel',ac.vane===v);
  });
}
function renderWVane(){
  ['<<','<','|','>','>>','<>','SWING'].forEach(v=>{
    const el=document.getElementById('w'+v);
    if(el) el.classList.toggle('sel',ac.wideVane===v);
  });
}
function renderInfo(){
  document.getElementById('operatingVal').textContent = ac.operating?'Çalışıyor':'Beklemede';
  document.getElementById('operatingVal').style.color = ac.operating?'#e65100':'var(--sub)';
  document.getElementById('iseeVal').textContent = ac.iSee?'Aktif':'Pasif';
  document.getElementById('iseeVal').style.color = ac.iSee?'#2e7d32':'var(--sub)';
  document.getElementById('cn105Val').textContent = ac.cn105?'Bağlı':'Bağlı Değil';
  document.getElementById('cn105Val').style.color = ac.cn105?'#2e7d32':'#c62828';
}
function setConn(s,l){
  document.getElementById('connDot').className='conn-dot '+s;
  document.getElementById('connTxt').textContent=l;
}
function setStatus(t){ document.getElementById('statusBar').textContent=t; }

renderAll();
</script>
</body>
</html>
