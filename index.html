<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Klima">
<title>Mitsubishi Klima</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#cc0018;--red2:#a80013;--bg:#f0f2f5;--card:#fff;
  --text:#1a1a2e;--sub:#7a8faa;--border:#e2e8f0;
  --blue:#1565c0;--on:#2e7d32;--heat:#e65100;--cool:#1565c0;
  --dry:#6a1b9a;--fan:#00695c;--auto:#4527a0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:64px}

/* ── Topbar ── */
.topbar{background:var(--red);padding:48px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-txt .name{color:#fff;font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.brand-txt .model{color:rgba(255,255,255,.65);font-size:10px;letter-spacing:.6px}
.conn-pill{background:rgba(0,0,0,.22);border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:6px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.conn-dot.ok{background:#69f0ae;box-shadow:0 0 6px #69f0ae}
.conn-dot.err{background:#ff5252}
.conn-txt{color:#fff;font-size:11px}

/* ── Main area ── */
.main{background:var(--red);padding:0 14px 16px}
.main-inner{background:#fff;border-radius:22px;padding:18px 16px}

/* Temps row */
.temps{display:flex;gap:10px;margin-bottom:14px}
.temp-box{flex:1;background:#f7f9fc;border-radius:14px;padding:12px 8px;text-align:center}
.temp-box .val{font-size:32px;font-weight:300;color:var(--text);line-height:1}
.temp-box .val sup{font-size:14px;color:var(--sub);vertical-align:super}
.temp-box .lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}

/* Power area */
.pwr-row{display:flex;align-items:center;gap:14px}
.pwr-btn{width:60px;height:60px;border-radius:50%;border:2.5px solid var(--border);background:#f7f9fc;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.09);transition:.2s;flex-shrink:0}
.pwr-btn:active{transform:scale(.92)}
.pwr-btn.on{border-color:var(--on);background:#e8f5e9;box-shadow:0 2px 14px rgba(46,125,50,.22)}
.pwr-info{flex:1}
.pwr-status{font-size:22px;font-weight:700;color:var(--text)}
.pwr-status.on{color:var(--on)}
.mode-chip{display:inline-flex;align-items:center;gap:5px;margin-top:3px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;background:var(--border);color:var(--sub)}
.mode-chip.heat{background:#fff3e0;color:var(--heat)}
.mode-chip.cool{background:#e3f2fd;color:var(--cool)}
.mode-chip.dry {background:#f3e5f5;color:var(--dry)}
.mode-chip.fan {background:#e0f2f1;color:var(--fan)}
.mode-chip.auto{background:#ede7f6;color:var(--auto)}
.settemp-box{background:#f7f9fc;border-radius:14px;padding:10px 14px;text-align:center;flex-shrink:0}
.settemp-val{font-size:26px;font-weight:500;color:var(--text);line-height:1}
.settemp-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Temp buttons */
.settemp-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px}
.tbtn{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);background:#fff;color:var(--red);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:.15s}
.tbtn:active{background:#fff0f0;transform:scale(.9)}

/* ── Sections ── */
.sec{background:#fff;margin:10px 12px 0;border-radius:18px;padding:14px 14px 12px}
.sec-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

/* Mode grid */
.mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.mbtn{border-radius:12px;border:1.5px solid var(--border);background:#fff;padding:9px 2px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.3px;transition:.18s}
.mbtn:active{opacity:.7}
.mbtn svg{width:22px;height:22px}
.mbtn.sel-heat{border-color:var(--heat);background:#fff8f5;color:var(--heat)}
.mbtn.sel-cool{border-color:var(--cool);background:#f0f7ff;color:var(--cool)}
.mbtn.sel-dry {border-color:var(--dry); background:#fdf5ff;color:var(--dry)}
.mbtn.sel-fan {border-color:var(--fan); background:#f0fffe;color:var(--fan)}
.mbtn.sel-auto{border-color:var(--auto);background:#f8f5ff;color:var(--auto)}

/* Pills */
.pills{display:flex;gap:6px}
.pbtn{flex:1;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);padding:9px 4px;cursor:pointer;font-size:11px;font-weight:600;text-align:center;transition:.18s}
.pbtn.sel{border-color:var(--red);background:#fff0f0;color:var(--red)}
.pbtn:active{opacity:.7}

/* Vane */
.vrow{display:flex;gap:5px}
.vbtn{flex:1;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);padding:9px 2px;cursor:pointer;font-size:12px;text-align:center;transition:.18s}
.vbtn.sel{border-color:var(--blue);background:#f0f7ff;color:var(--blue)}
.vbtn:active{opacity:.7}

/* Info */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ibox{background:#f7f9fc;border-radius:12px;padding:10px 6px;text-align:center}
.ibox .iv{font-size:14px;font-weight:600;color:var(--text)}
.ibox .il{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── Schedule tab ── */
.tab-content{display:none}
.tab-content.active{display:block}

.sched-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 0}
.sched-title{font-size:17px;font-weight:700;color:var(--text)}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(200,0,20,.3)}

.sched-list{padding:10px 12px}
.sched-day-group{margin-bottom:10px}
.sched-day-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;padding-left:2px}
.sched-item{background:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sched-item.inactive{opacity:.5}
.sched-left{display:flex;align-items:center;gap:10px}
.sched-time{font-size:22px;font-weight:300;color:var(--text);line-height:1}
.sched-info{font-size:12px;color:var(--sub);margin-top:2px}
.sched-toggle{width:44px;height:24px;border-radius:12px;border:none;background:#e0e0e0;position:relative;cursor:pointer;transition:.25s;flex-shrink:0}
.sched-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sched-toggle.on{background:var(--red)}
.sched-toggle.on::after{left:23px}
.del-btn{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:4px;margin-left:4px}

.no-sched{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px}

/* ── Add schedule modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px}
.modal-section{margin-bottom:14px}
.modal-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-btn{border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);padding:8px 2px;cursor:pointer;font-size:10px;font-weight:700;text-align:center;transition:.18s}
.day-btn.sel{border-color:var(--red);background:#fff0f0;color:var(--red)}
.time-inp{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:18px;text-align:center;outline:none;color:var(--text)}
.time-inp:focus{border-color:var(--red)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sel-inp{border:1.5px solid var(--border);border-radius:12px;padding:11px;font-size:14px;color:var(--text);background:#fff;width:100%;outline:none;-webkit-appearance:none}
.sel-inp:focus{border-color:var(--red)}
.temp-inp{border:1.5px solid var(--border);border-radius:12px;padding:11px;font-size:14px;color:var(--text);background:#fff;width:100%;outline:none;text-align:center}
.temp-inp:focus{border-color:var(--red)}
.save-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.save-btn:active{opacity:.85}
.cancel-btn{width:100%;background:var(--border);color:var(--sub);border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}

/* ── Bottom nav ── */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--red2);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.nbtn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:rgba(255,255,255,.55);font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;text-transform:uppercase}
.nbtn.active{color:#fff}
.nbtn .nico{font-size:19px}

.statusbar{text-align:center;font-size:11px;color:var(--sub);padding:10px 14px}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">
    <!-- Mitsubishi Electric logo: 3 proper rhombuses (60° angles), isometric geometry -->
    <svg viewBox="-2 -2 64 56" width="46" height="40">
      <!-- Top diamond: points up, inner vertex at center (30,34.6) -->
      <polygon points="30,34.6 40,17.3 30,0 20,17.3" fill="white"/>
      <!-- Bottom-left diamond: points down-left -->
      <polygon points="30,34.6 10,34.6 0,51.9 20,51.9" fill="white"/>
      <!-- Bottom-right diamond: points down-right -->
      <polygon points="30,34.6 50,34.6 60,51.9 40,51.9" fill="white"/>
    </svg>
    <div class="brand-txt">
      <div class="name">Mitsubishi Electric</div>
      <div class="model">MSZ-FA35VA</div>
    </div>
  </div>
  <div class="conn-pill">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-txt" id="connTxt">--</span>
  </div>
</div>

<!-- ══════════ KONTROL TAB ══════════ -->
<div id="tabControl" class="tab-content active">

<div class="main">
  <div class="main-inner">

    <!-- Sıcaklıklar -->
    <div class="temps">
      <div class="temp-box">
        <div class="val" id="roomVal">--<sup>°</sup></div>
        <div class="lbl">Oda</div>
      </div>
      <div class="temp-box">
        <div class="val" id="outVal">--<sup>°</sup></div>
        <div class="lbl">Dış Ortam</div>
      </div>
    </div>

    <!-- Güç + durum + hedef -->
    <div class="pwr-row">
      <button class="pwr-btn" id="pwrBtn" onclick="togglePower()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 2v10M6.3 5A8 8 0 1 0 17.7 5"/>
        </svg>
      </button>
      <div class="pwr-info">
        <div class="pwr-status" id="pwrTxt">KAPALI</div>
        <div class="mode-chip" id="modeChip">—</div>
      </div>
      <div class="settemp-box">
        <div class="settemp-val" id="setVal">22.0°</div>
        <div class="settemp-lbl">Hedef</div>
      </div>
    </div>

    <div class="settemp-row">
      <button class="tbtn" onclick="changeTemp(-0.5)">−</button>
      <span style="font-size:11px;color:var(--sub)">Sıcaklık Ayarla</span>
      <button class="tbtn" onclick="changeTemp(+0.5)">+</button>
    </div>
  </div>
</div>

<!-- Mod -->
<div class="sec">
  <div class="sec-title">Çalışma Modu</div>
  <div class="mode-grid">
    <button class="mbtn" id="mHEAT" onclick="setMode('HEAT',1)">
      <!-- Sun with 8 rays — Mitsubishi/MELCloud heat icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.9" y1="4.9" x2="7.1" y2="7.1"/>
        <line x1="16.9" y1="16.9" x2="19.1" y2="19.1"/>
        <line x1="19.1" y1="4.9" x2="16.9" y2="7.1"/>
        <line x1="4.9" y1="19.1" x2="7.1" y2="16.9"/>
      </svg>ISITMA
    </button>
    <button class="mbtn" id="mCOOL" onclick="setMode('COOL',3)">
      <!-- 6-arm snowflake with branch ticks -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="3.3" y1="7" x2="20.7" y2="17"/>
        <line x1="20.7" y1="7" x2="3.3" y2="17"/>
        <line x1="9.5" y1="4.5" x2="12" y2="7.5"/><line x1="14.5" y1="4.5" x2="12" y2="7.5"/>
        <line x1="9.5" y1="19.5" x2="12" y2="16.5"/><line x1="14.5" y1="19.5" x2="12" y2="16.5"/>
        <line x1="4.2" y1="10" x2="7.2" y2="10.8"/><line x1="4.2" y1="14" x2="7.2" y2="13.2"/>
        <line x1="19.8" y1="10" x2="16.8" y2="10.8"/><line x1="19.8" y1="14" x2="16.8" y2="13.2"/>
      </svg>SOĞUTMA
    </button>
    <button class="mbtn" id="mAUTO" onclick="setMode('AUTO',8)">
      <!-- Up+down arrows = auto/smart mode -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>OTO
    </button>
    <button class="mbtn" id="mDRY" onclick="setMode('DRY',2)">
      <!-- Water drop -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3C12 3 5.5 10.5 5.5 15a6.5 6.5 0 0 0 13 0C18.5 10.5 12 3 12 3z"/>
        <line x1="9.5" y1="16" x2="9.5" y2="16.1"/>
        <line x1="12" y1="17.5" x2="12" y2="17.6"/>
      </svg>KURUTMA
    </button>
    <button class="mbtn" id="mFAN" onclick="setMode('FAN',7)">
      <!-- 3-blade fan — clean rounded blades -->
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="1.6"/>
        <path d="M12,10.4 C11.1,8.5 9.5,7 7.5,6.8 C5.5,6.5 4.2,8 4.8,9.8 C5.4,11.6 8.4,12.2 10.7,11.5 Z"/>
        <path d="M13.6,11.5 C15.4,12.7 17.6,13 19.2,12 C20.8,11 20.8,9.1 19.4,8.1 C18,7.1 15.3,8.3 14,10.4 Z" transform="rotate(120,12,12)"/>
        <path d="M10.4,12.5 C8.8,14.1 8.3,16.3 9.3,17.8 C10.3,19.3 12.2,19.3 13.4,18 C14.6,16.7 13.8,14 12,12.5 Z" transform="rotate(240,12,12)"/>
      </svg>FAN
    </button>
  </div>
</div>

<!-- Fan -->
<div class="sec">
  <div class="sec-title">Fan Hızı</div>
  <div class="pills">
    <button class="pbtn" id="fAUTO"  onclick="setFan('AUTO')">Oto</button>
    <button class="pbtn" id="f1"     onclick="setFan('1')">1</button>
    <button class="pbtn" id="f2"     onclick="setFan('2')">2</button>
    <button class="pbtn" id="f3"     onclick="setFan('3')">3</button>
    <button class="pbtn" id="f4"     onclick="setFan('4')">4</button>
    <button class="pbtn" id="fQUIET" onclick="setFan('QUIET')">Sessiz</button>
  </div>
</div>

<!-- Dikey yön -->
<div class="sec">
  <div class="sec-title">Dikey Yön</div>
  <div class="vrow">
    <button class="vbtn" id="vAUTO"  onclick="setVane('AUTO')">Oto</button>
    <button class="vbtn" id="v1"     onclick="setVane('1')">▲▲</button>
    <button class="vbtn" id="v2"     onclick="setVane('2')">▲</button>
    <button class="vbtn" id="v3"     onclick="setVane('3')">—</button>
    <button class="vbtn" id="v4"     onclick="setVane('4')">▼</button>
    <button class="vbtn" id="v5"     onclick="setVane('5')">▼▼</button>
    <button class="vbtn" id="vSWING" onclick="setVane('SWING')">↕</button>
  </div>
</div>

<!-- Yatay yön -->
<div class="sec">
  <div class="sec-title">Yatay Yön</div>
  <div class="vrow">
    <button class="vbtn" id="w<<"    onclick="setWVane('<<')">◀◀</button>
    <button class="vbtn" id="w<"     onclick="setWVane('<')">◀</button>
    <button class="vbtn" id="w|"     onclick="setWVane('|')">●</button>
    <button class="vbtn" id="w>"     onclick="setWVane('>')">▶</button>
    <button class="vbtn" id="w>>"    onclick="setWVane('>>')">▶▶</button>
    <button class="vbtn" id="w<>"    onclick="setWVane('<>')">◀▶</button>
    <button class="vbtn" id="wSWING" onclick="setWVane('SWING')">↔</button>
  </div>
</div>

<!-- Durum -->
<div class="sec">
  <div class="sec-title">Cihaz Durumu</div>
  <div class="info-grid">
    <div class="ibox"><div class="iv" id="ivComp">—</div><div class="il">Kompresör</div></div>
    <div class="ibox"><div class="iv" id="ivIsee">—</div><div class="il">i-see</div></div>
    <div class="ibox"><div class="iv" id="ivCn">—</div><div class="il">CN105</div></div>
  </div>
</div>

<div class="statusbar" id="statusBar">Bağlanıyor...</div>
</div><!-- end tabControl -->


<!-- ══════════ PROGRAM TAB ══════════ -->
<div id="tabSchedule" class="tab-content">
  <div class="sched-header">
    <div class="sched-title">Haftalık Program</div>
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
  <div class="sched-list" id="schedList">
    <div class="no-sched" id="noSched">Henüz program eklenmedi.<br>+ butonuna bas.</div>
  </div>
</div>


<!-- ══════════ PROGRAM EKLE MODAL ══════════ -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">Program Ekle</div>

    <div class="modal-section">
      <div class="modal-label">Günler</div>
      <div class="day-grid">
        <button class="day-btn" data-d="1">Pzt</button>
        <button class="day-btn" data-d="2">Sal</button>
        <button class="day-btn" data-d="3">Çar</button>
        <button class="day-btn" data-d="4">Per</button>
        <button class="day-btn" data-d="5">Cum</button>
        <button class="day-btn" data-d="6">Cmt</button>
        <button class="day-btn" data-d="0">Paz</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Saat</div>
      <input type="time" class="time-inp" id="schedTime" value="07:00">
    </div>

    <div class="modal-section">
      <div class="modal-label">İşlem</div>
      <div class="row2">
        <select class="sel-inp" id="schedPower">
          <option value="on">Aç</option>
          <option value="off">Kapat</option>
        </select>
        <select class="sel-inp" id="schedMode">
          <option value="HEAT">Isıtma</option>
          <option value="COOL">Soğutma</option>
          <option value="AUTO">Otomatik</option>
          <option value="DRY">Kurutma</option>
          <option value="FAN">Fan</option>
        </select>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Hedef Sıcaklık</div>
      <input type="number" class="temp-inp" id="schedTemp" value="22" min="16" max="31" step="0.5">
    </div>

    <button class="save-btn" onclick="saveSchedule()">Kaydet</button>
    <button class="cancel-btn" onclick="closeModal()">İptal</button>
  </div>
</div>


<!-- ══════════ BOTTOM NAV ══════════ -->
<div class="bottomnav">
  <button class="nbtn active" id="nb0" onclick="switchTab(0)">
    <span class="nico">🏠</span>Kontrol
  </button>
  <button class="nbtn" id="nb1" onclick="switchTab(1)">
    <span class="nico">📅</span>Program
  </button>
</div>


<script>
// ── MQTT ──
const BROKER='wss://broker.emqx.io:8084/mqtt', MAC='D48AFC9E85C8';
const T_ST='mits/'+MAC+'/status', T_CMD='mits/'+MAC+'/cmd';

let ac={power:false,mode:'COOL',setTemp:22,fan:'AUTO',vane:'AUTO',wideVane:'|',
        roomTemp:null,outTemp:null,iSee:false,operating:false,cn105:false};

const locks={};
function lock(...fs){fs.forEach(f=>{clearTimeout(locks[f]);locks[f]=setTimeout(()=>delete locks[f],8000);})}
function locked(f){return !!locks[f]}

const client=mqtt.connect(BROKER,{clientId:'app_'+Math.random().toString(36).slice(2,8),clean:true,reconnectPeriod:3000,connectTimeout:8000});
client.on('connect',()=>{setConn('ok','Bağlı');client.subscribe(T_ST);});
client.on('close',()=>setConn('err','Bağlantı yok'));
client.on('reconnect',()=>setConn('','Bağlanıyor'));
client.on('message',(t,p)=>{
  try{
    const d=JSON.parse(p.toString());
    if(!locked('power')    && d.power!=null)    ac.power    =d.power===true||d.power==='ON';
    if(!locked('mode')     && d.mode!=null)     ac.mode     =d.mode;
    if(!locked('setTemp')  && d.setTemp!=null)  ac.setTemp  =+d.setTemp;
    if(!locked('fan')      && d.fan!=null)      ac.fan      =d.fan;
    if(!locked('vane')     && d.vane!=null)     ac.vane     =d.vane;
    if(!locked('wideVane') && d.wideVane!=null) ac.wideVane =d.wideVane;
    if(d.roomTemp!=null) ac.roomTemp =+d.roomTemp;
    if(d.outTemp!=null)  ac.outTemp  =+d.outTemp;
    if(d.iSee!=null)     ac.iSee     =d.iSee;
    if(d.operating!=null)ac.operating=d.operating;
    if(d.cn105!=null)    ac.cn105    =d.cn105;
    renderAll();
    setStatus('Güncellendi '+new Date().toLocaleTimeString('tr-TR'));
  }catch(e){}
});
function send(o){lock(...Object.keys(o));client.publish(T_CMD,JSON.stringify(o));}

// ── Actions ──
function togglePower(){ac.power=!ac.power;send({power:ac.power});renderPower();}
let tTimer=null;
function changeTemp(d){
  ac.setTemp=Math.round((Math.min(31,Math.max(16,ac.setTemp+d))*2))/2;
  lock('setTemp');renderTemp();
  clearTimeout(tTimer);tTimer=setTimeout(()=>send({setTemp:ac.setTemp}),400);
}
const MNUM={HEAT:1,COOL:3,AUTO:8,DRY:2,FAN:7};
function setMode(s,n){ac.mode=s;send({mode:n});renderMode();}
function setFan(s){ac.fan=s;send({fan:s});renderFan();}
function setVane(v){ac.vane=v;send({vane:v});renderVane();}
function setWVane(v){ac.wideVane=v;send({wideVane:v});renderWVane();}

// ── Render ──
function renderAll(){renderPower();renderTemp();renderMode();renderFan();renderVane();renderWVane();renderInfo();}
const MCOL={HEAT:'heat',COOL:'cool',DRY:'dry',FAN:'fan',AUTO:'auto'};
const MNAME={HEAT:'Isıtma',COOL:'Soğutma',DRY:'Kurutma',FAN:'Fan',AUTO:'Otomatik'};
const MICO={HEAT:'☀',COOL:'❄',DRY:'💧',FAN:'💨',AUTO:'↻'};

function renderPower(){
  const b=document.getElementById('pwrBtn'),t=document.getElementById('pwrTxt'),c=document.getElementById('modeChip');
  b.classList.toggle('on',ac.power);
  t.textContent=ac.power?'AÇIK':'KAPALI'; t.className='pwr-status'+(ac.power?' on':'');
  c.textContent=(MICO[ac.mode]||'')+' '+(MNAME[ac.mode]||ac.mode);
  c.className='mode-chip '+(MCOL[ac.mode]||'');
}
function renderTemp(){
  document.getElementById('roomVal').innerHTML=(ac.roomTemp&&ac.roomTemp>0?ac.roomTemp.toFixed(1):'--')+'<sup>°</sup>';
  document.getElementById('outVal').innerHTML=(ac.outTemp!=null&&ac.outTemp>-50?ac.outTemp.toFixed(1):'--')+'<sup>°</sup>';
  document.getElementById('setVal').textContent=ac.setTemp.toFixed(1)+'°';
}
function renderMode(){
  ['HEAT','COOL','AUTO','DRY','FAN'].forEach(m=>{
    const e=document.getElementById('m'+m);if(e)e.className='mbtn'+(ac.mode===m?' sel-'+MCOL[m]:'');
  });
}
function renderFan(){
  ['AUTO','1','2','3','4','QUIET'].forEach(f=>{
    const e=document.getElementById('f'+f);if(e)e.classList.toggle('sel',ac.fan===f);
  });
}
function renderVane(){
  ['AUTO','1','2','3','4','5','SWING'].forEach(v=>{
    const e=document.getElementById('v'+v);if(e)e.classList.toggle('sel',ac.vane===v);
  });
}
function renderWVane(){
  ['<<','<','|','>','>>','<>','SWING'].forEach(v=>{
    const e=document.getElementById('w'+v);if(e)e.classList.toggle('sel',ac.wideVane===v);
  });
}
function renderInfo(){
  const c=document.getElementById('ivComp');
  c.textContent=ac.operating?'Çalışıyor':'Beklemede';c.style.color=ac.operating?'var(--heat)':'var(--sub)';
  const i=document.getElementById('ivIsee');
  i.textContent=ac.iSee?'Aktif':'Pasif';i.style.color=ac.iSee?'var(--on)':'var(--sub)';
  const n=document.getElementById('ivCn');
  n.textContent=ac.cn105?'Bağlı':'Yok';n.style.color=ac.cn105?'var(--on)':'#c62828';
}
function setConn(s,l){document.getElementById('connDot').className='conn-dot '+s;document.getElementById('connTxt').textContent=l;}
function setStatus(t){document.getElementById('statusBar').textContent=t;}

// ── Tabs ──
function switchTab(i){
  document.getElementById('tabControl').classList.toggle('active',i===0);
  document.getElementById('tabSchedule').classList.toggle('active',i===1);
  document.getElementById('nb0').classList.toggle('active',i===0);
  document.getElementById('nb1').classList.toggle('active',i===1);
}

// ── Schedule ──
const DAYS=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
let schedules=JSON.parse(localStorage.getItem('klimaSchedules')||'[]');
let selDays=new Set();
let lastFired={};

function saveScheds(){localStorage.setItem('klimaSchedules',JSON.stringify(schedules));}
function renderSchedules(){
  const list=document.getElementById('schedList');
  const ns=document.getElementById('noSched');
  if(!schedules.length){ns.style.display='block';list.innerHTML='';list.appendChild(ns);return;}
  ns.style.display='none';
  // Group by day
  const byDay={};
  schedules.forEach((s,i)=>{
    s.days.forEach(d=>{if(!byDay[d])byDay[d]=[];byDay[d].push({s,i});});
  });
  list.innerHTML='';
  // Sort: Mon-Sun (1-6, 0)
  [1,2,3,4,5,6,0].forEach(d=>{
    if(!byDay[d])return;
    const grp=document.createElement('div');grp.className='sched-day-group';
    grp.innerHTML='<div class="sched-day-label">'+DAYS[d]+'</div>';
    byDay[d].forEach(({s,i})=>{
      const pw=s.power==='on'?'Aç':'Kapat';
      const info=s.power==='on'?pw+' · '+MNAME[s.mode]+' · '+s.temp+'°':'pw';
      const item=document.createElement('div');
      item.className='sched-item'+(s.active?'':' inactive');
      item.innerHTML=`
        <div class="sched-left">
          <div class="sched-time">${s.time}</div>
          <div class="sched-info">${s.power==='on'?'Aç · '+MNAME[s.mode]+' · '+s.temp+'°':'Kapat'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="sched-toggle${s.active?' on':''}" onclick="toggleSched(${i})"></button>
          <button class="del-btn" onclick="delSched(${i})">✕</button>
        </div>`;
      grp.appendChild(item);
    });
    list.appendChild(grp);
  });
}
function toggleSched(i){schedules[i].active=!schedules[i].active;saveScheds();renderSchedules();}
function delSched(i){schedules.splice(i,1);saveScheds();renderSchedules();}

function openModal(){
  selDays=new Set();
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('schedTime').value='07:00';
  document.getElementById('schedPower').value='on';
  document.getElementById('schedMode').value='HEAT';
  document.getElementById('schedTemp').value='22';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function closeModalBg(e){if(e.target===document.getElementById('modalBg'))closeModal();}

document.querySelectorAll('.day-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const d=+b.dataset.d;
    if(selDays.has(d)){selDays.delete(d);b.classList.remove('sel');}
    else{selDays.add(d);b.classList.add('sel');}
  });
});

function saveSchedule(){
  if(!selDays.size){alert('En az bir gün seç');return;}
  const t=document.getElementById('schedTime').value;
  if(!t){alert('Saat seç');return;}
  schedules.push({
    days:[...selDays],
    time:t,
    power:document.getElementById('schedPower').value,
    mode:document.getElementById('schedMode').value,
    temp:+document.getElementById('schedTemp').value,
    active:true
  });
  saveScheds();renderSchedules();closeModal();
}

// Schedule executor (runs every 30s)
function runSchedules(){
  const now=new Date();
  const day=now.getDay();
  const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const key=day+'_'+hhmm;
  if(lastFired[key])return;
  schedules.forEach(s=>{
    if(!s.active)return;
    if(!s.days.includes(day))return;
    if(s.time!==hhmm)return;
    lastFired[key]=true;
    // Execute
    if(s.power==='off'){send({power:false});}
    else{
      const mNum=MNUM[s.mode]||3;
      send({power:true,mode:mNum,setTemp:s.temp});
    }
    console.log('Schedule executed:',s);
  });
  // Clear old keys
  const keys=Object.keys(lastFired);
  if(keys.length>100)keys.slice(0,50).forEach(k=>delete lastFired[k]);
}
setInterval(runSchedules,30000);

renderAll();
renderSchedules();
</script>
</body>
</html>
